name: Docusaurus Docs

on:
  pull_request:
    paths:
      - "docusaurus-docs/**"
      - "config/**"
      - "webhooks/**"
      - "requirements.txt"
      - "manage.py"
      - ".github/workflows/docusaurus-docs.yml"
  push:
    branches:
      - master
    paths:
      - "docusaurus-docs/**"
      - "config/**"
      - "webhooks/**"
      - "requirements.txt"
      - "manage.py"
      - ".github/workflows/docusaurus-docs.yml"

jobs:
  validate-and-build:
    name: Validate schema and build docs
    runs-on: ubuntu-latest

    # Necessario apenas quando o deploy AWS estiver habilitado com OIDC.
    # permissions:
    #   id-token: write
    #   contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docusaurus-docs/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install docs dependencies
        working-directory: docusaurus-docs
        run: npm ci

      - name: Generate OpenAPI schema
        run: DJANGO_DEBUG=False python manage.py spectacular --file docusaurus-docs/openapi/openapi.yaml --validate

      - name: Check generated schema is committed
        run: git diff --exit-code docusaurus-docs/openapi/openapi.yaml

      - name: Lint OpenAPI schema
        run: npx @redocly/cli@latest lint --config docusaurus-docs/redocly.yaml docusaurus-docs/openapi/openapi.yaml

      - name: Build Docusaurus
        working-directory: docusaurus-docs
        run: npm run build:ci

