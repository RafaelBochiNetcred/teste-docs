site_name: Netcred API
site_description: Portal de documentacao da API REST da Netcred.
site_author: Netcred

docs_dir: docs
site_dir: site

theme:
  name: material
  language: pt-BR
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: indigo

nav:
  - Inicio: index.md
  - Conteudo Postman:
      - Visao geral: postman/index.md
      - Por onde comecar: postman/por-onde-comecar/index.md
      - Autenticacao: postman/autenticacao/index.md
      - Homologacao: postman/instrucoes-para-homologacao.md
      - Producao: postman/instrucoes-para-producao.md
      - Analise de risco: postman/analise-de-risco.md
      - Formatacao dos dados: postman/formatacao-dos-dados.md
      - Cobranca: postman/cobranca/index.md
      - Webhook: postman/webhook/index.md
      - Consultas: postman/consultas-queries/index.md
      - Objetos: postman/objetos/index.md
      - Marketplace: postman/marketplace/index.md
  - Referencia da API:
      - OpenAPI: referencia/openapi.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
