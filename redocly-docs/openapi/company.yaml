components:
  schemas:
    Company:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Nome da empresa vinculada a uma ou mais assinaturas de webhook.
          maxLength: 255
        marketplace_id:
          type: string
          description: Identificador externo da empresa no marketplace, quando existir.
          maxLength: 64
      required:
      - id
      - name
    CompanyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          description: Nome da empresa vinculada a uma ou mais assinaturas de webhook.
          maxLength: 255
        marketplace_id:
          type: string
          description: Identificador externo da empresa no marketplace, quando existir.
          maxLength: 64
      required:
      - name
    PaginatedCompanyList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Company'
    PatchedCompanyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          description: Nome da empresa vinculada a uma ou mais assinaturas de webhook.
          maxLength: 255
        marketplace_id:
          type: string
          description: Identificador externo da empresa no marketplace, quando existir.
          maxLength: 64
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
